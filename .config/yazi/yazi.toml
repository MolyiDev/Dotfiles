[opener]
play = [
	{ run = 'vlc "$@"', orphan = true},
]
edit = [
	{ run = "$EDITOR %s", block = true},
]
open = [
	{ run = "xdg-open %s", desc = "Open" },
]

[open]
prepend_rules = [
	{ url = "*.json", use = "edit" },
	{ url = "*.sh", use = "edit" },
	{ url = "*.toml", use = "edit" },
	{ url = "*.y*ml", use = "edit" },
	{ url = "*config", use = "edit" },
	{ url = "*.cfg", use = "edit" },
	{ url = "*env", use = "edit" },
	{ url = "*.d", use = "edit" },
	{ url = "*.md", use = "edit" },
	{ url = "*.txt", use = "edit" },
	{ url = ".zsh*", use = "edit" },
	{ url = "*.ini", use = "edit" },
	{ url = "*.lua", use = "edit" },
	{ url = "*.xml", use = "edit" },
	{ url = "*.log", use = "edit" },
	{ url = "*.ods", use = "open" },
	{ url = "*.pdf", use = "open" },
	{ url = "*.mp3", use = "play" },
]
append_rules = [
	{ url = "*", use = "edit" },
]

[mgr]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = true
linemode = "size"
show_symlink = true
scrolloff = 8

[input]
cursor_blink = false
